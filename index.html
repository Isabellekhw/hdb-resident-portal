    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f0;
      --color-background-tertiary: #eeede8;
      --color-background-info: #e6f1fb;
      --color-background-success: #e1f5ee;
      --color-background-danger: #fcebeb;
      --color-background-warning: #faeeda;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #185fa5;
      --color-text-danger: #a32d2d;
      --color-text-success: #1d9e75;
      --color-border-tertiary: rgba(26,26,24,0.15);
      --color-border-secondary: rgba(26,26,24,0.3);
      --color-border-primary: rgba(26,26,24,0.4);
      --color-border-info: #b5d4f4;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2a2a28;
        --color-background-tertiary: #252523;
        --color-background-info: #0c2a47;
        --color-background-success: #062820;
        --color-background-danger: #3a1010;
        --color-background-warning: #3a2408;
        --color-text-primary: #f0ede6;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-info: #85b7eb;
        --color-text-danger: #f09595;
        --color-text-success: #5dcaa5;
        --color-border-tertiary: rgba(240,237,230,0.15);
        --color-border-secondary: rgba(240,237,230,0.3);
        --color-border-primary: rgba(240,237,230,0.4);
        --color-border-info: #185fa5;
      }
    }
    html, body { height: 100%; font-family: var(--font-sans); background: var(--color-background-tertiary); color: var(--color-text-primary); }
    #root { min-height: 100vh; }

    input, select, textarea, button {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--color-text-primary);
    }
    input[type="text"], input[type="email"], input[type="password"], select, textarea {
      width: 100%;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
      height: 36px;
    }
    textarea { height: auto; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--color-text-info);
      box-shadow: 0 0 0 2px rgba(24,95,165,0.12);
    }
    input:disabled { opacity: 0.4; cursor: not-allowed; }
    button { cursor: pointer; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 4px; }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .two-col-grid { grid-template-columns: 1fr !important; }
      .four-col-grid { grid-template-columns: 1fr 1fr !important; }
      .cat-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
  </style>

          React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:8,minHeight:160,maxHeight:240}},
            thread.filter(m=>m.sender==="tc").length===0&&!autoLoading&&React.createElement("div",{style:{textAlign:"center",fontSize:12,color:"var(--color-text-tertiary)",padding:"1rem 0"}},isAI?"⏳ Auto-reply being prepared…":"Waiting for TC officer to reply…"),
            autoLoading&&React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:"1rem 0",gap:6}},
              React.createElement("div",{style:{display:"flex",gap:4}},[0,1,2].map(i=>React.createElement("div",{key:i,style:{width:6,height:6,borderRadius:"50%",background:"var(--color-text-tertiary)",animation:`bounce 0.9s ${i*0.2}s infinite`}}))),
              React.createElement("div",{style:{fontSize:12,color:"var(--color-text-secondary)"}},"Waiting for auto-reply…")
            ),
            thread.map(msg=>React.createElement(MsgBubble,{key:msg.id,msg,side:msg.sender==="resident"?"right":"left"})),
            React.createElement("div",{ref:resRef})
          ),
          React.createElement("div",{style:{padding:"10px 12px",borderTop:"0.5px solid var(--color-border-tertiary)",display:"flex",gap:8}},
            React.createElement("input",{value:resInput,onChange:e=>setResInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&sendRes(),placeholder:"Reply as resident… (Enter to send)",style:{flex:1,fontSize:12}}),
            React.createElement("button",{onClick:sendRes,disabled:!resInput.trim(),style:{background:"#378ADD",color:"#fff",border:"none",borderRadius:8,padding:"0 14px",fontSize:13,cursor:"pointer",opacity:!resInput.trim()?0.4:1,flexShrink:0}},"Send")
          )
        )
      ),
      React.createElement("div",{style:{marginTop:"1rem",padding:"10px 14px",background:"var(--color-background-secondary)",borderRadius:8,fontSize:12,color:"var(--color-text-secondary)"}},
        isAI?React.createElement("span",null,"🤖 ",React.createElement("strong",{style:{color:"#1D9E75"}},"AI-dispatched:")," Confirmation SMS auto-sent to resident. You can still type follow-ups."):React.createElement("span",null,"✏️ ",React.createElement("strong",{style:{color:"#185FA5"}},"Manual:")," Type your reply or click Refresh for AI suggestions."),
        " · 💬 ",React.createElement("strong",null,"Resident panel:")," Type a follow-up to simulate the resident replying."
      )
    )
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("home");
  const [feedback,setFeedback]=useState(SEED_FEEDBACK);
  const [announcements]=useState(SEED_ANNOUNCEMENTS);
  const [chatOpen,setChatOpen]=useState(false);
  const [chatSeen,setChatSeen]=useState(false);
  const [lang,setLang]=useState("en");
  const [user,setUser]=useState(null);
  const [notifications,setNotifications]=useState([]);
  const [toast,setToast]=useState(null);
  const t=T[lang]||T.en;

  function handleSubmit(fb){
    setFeedback(prev=>[fb,...prev]);
    const notifs=[{id:Date.now(),type:"submitted",title:"Case submitted",body:"Ref: "+fb.id+" — "+fb.subject,time:new Date().toISOString(),read:false}];
    if(fb.autoDispatched) notifs.push({id:Date.now()+1,type:"dispatched",title:"Team dispatched",body:(DISPATCH_CONFIG[fb.category]?.label||"Team")+" assigned to "+fb.id,time:new Date().toISOString(),read:false});
    setNotifications(prev=>[...notifs,...prev]);
    if(fb.autoDispatched) setToast({title:t.notifTitle,body:t.notifSMS+" "+(fb.contact||"your number")+" — "+(DISPATCH_CONFIG[fb.category]?.label||"Team")+" dispatched"});
  }

  return React.createElement("div",{style:{minHeight:"100vh",background:"var(--color-background-tertiary)"}},
    React.createElement(NavBar,{page,setPage,lang,setLang,user,notifications,onMarkAll:()=>setNotifications(prev=>prev.map(n=>({...n,read:true}))),t}),
    page==="home"&&React.createElement(HomePage,{setPage,feedback,announcements,t}),
    page==="submit"&&React.createElement(SubmitPage,{onSubmit:handleSubmit,user,t}),
    page==="track"&&React.createElement(TrackPage,{feedback,t}),
    page==="announcements"&&React.createElement(AnnouncementsPage,{announcements,t}),
    page==="mycases"&&user&&React.createElement(MyCasesPage,{user,feedback,t}),
    page==="login"&&React.createElement(LoginPage,{onLogin:u=>{setUser(u);setPage("home");},t}),
    page==="admin"&&React.createElement(AdminPage,{feedback,setFeedback,onToast:setToast,t}),
    page==="demo"&&React.createElement(ResidentDemoPage,{feedback,onToast:setToast}),
    React.createElement("button",{onClick:()=>{setChatOpen(o=>!o);setChatSeen(true);},title:"Chat with HDB Assistant",style:{position:"fixed",bottom:20,right:20,width:52,height:52,borderRadius:"50%",background:"#185FA5",color:"#fff",border:"none",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,boxShadow:"0 4px 16px rgba(24,95,165,0.35)"}},
      "💬",!chatSeen&&React.createElement("span",{style:{position:"absolute",top:4,right:4,width:10,height:10,borderRadius:"50%",background:"#E24B4A",border:"2px solid #fff"}})
    ),
    React.createElement(AIChat,{open:chatOpen,onClose:()=>setChatOpen(false)}),
    toast&&React.createElement(NotifToast,{toast,onClose:()=>setToast(null)})
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
